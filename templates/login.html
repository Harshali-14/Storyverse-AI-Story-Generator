{% extends 'base.html' %}


{% block title %}
Login | StoryVerse
{% endblock %}



{% block content %}


<div class="auth-box">


<h1>Welcome Back</h1>


<form method="post">

{% csrf_token %}


<input
type="text"
name="username"
placeholder="Username"
required>



<input
type="password"
name="password"
placeholder="Password"
required>



<button type="submit">
Login
</button>


</form>



<p>

New user?

<a href="{% url 'register' %}">
Create account
</a>

</p>


</div>


{% endblock %}
