{% extends 'base.html' %}

{% block title %}
Register | StoryVerse
{% endblock %}


{% block content %}

<div class="auth-box">

<h1>Create Account</h1>


<form method="post">

{% csrf_token %}


<input 
type="text"
name="username"
placeholder="Username"
required>


<input 
type="email"
name="email"
placeholder="Email"
required>


<input 
type="password"
name="password1"
placeholder="Password"
required>


<input 
type="password"
name="password2"
placeholder="Confirm Password"
required>


<button type="submit">
Register
</button>


</form>


<p>
Already have account?
<a href="{% url 'login' %}">
Login
</a>
</p>


</div>


{% endblock %}
